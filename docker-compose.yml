services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"   # RTSP (only expose RTSP port as requested)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  streamer:
    build: .
    container_name: python_rtsp_streamer
    depends_on:
      - mediamtx
    ports:
      - "8338:8000"   # FastAPI Web API & Swagger UI (mapped host 8338 -> container 8000)
    volumes:
      - ./inputs:/app/inputs
    environment:
      - INPUTS_DIR=/app/inputs
      - RTSP_SERVER_URL=rtsp://mediamtx:8554
      - TRANSCODE=true
      - VIDEO_BITRATE=2M
      - FPS=30
      - HOST_IP=27.71.24.102   # Set your server's public IP to display correct RTSP play links in the API
    restart: unless-stopped
